<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script src="js.js"></script>
    <h3>ĐĂNG KÝ THÀNH VIÊN</h3>
    <form action="" onsubmit="return kiemtra()">
        <table border="1">
            <tr>
                <td>Họ Tên:</td>
                <td><input type="text" id="name"></td>
            </tr>
            <tr>
                <td>Email:</td>
                <td><input type="email" id="email"></td>
            </tr>
            <tr>
                <td>Số Điện Thoại:</td>
                <td><input type="text" id="sdt"></td>
            </tr>
            <tr>
                <td>Username:</td>
                <td><input type="text" id="us"></td>
            </tr>
            <tr>
                <td>Mật khẩu:</td>
                <td><input type="password" id="pass"></td>
            </tr>
            <tr>
                <td>Nhập lại mật khẩu:</td>
                <td><input type="password" id="repass"></td>
            </tr>
            <tr>
                <td>Bạn biết chúng tôi:</td>
                <td>
                    <input type="radio" name="source" value="gt"> Giới thiệu
                    <input type="radio" name="source" value="fb"> Facebook
                </td>
            </tr>
            <tr>
                <td colspan="2" style="text-align: center;">
                    <input type="submit" value="ĐĂNG KÝ">
                </td>
            </tr>
        </table>
    </form>
</body>
</html>
