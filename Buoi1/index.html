<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        console.log('hello world'); // hiển thị dữ liệu ở cửa sổ console của trình duyệt
        document.write("Hello Việt Nam"); // hiển thị dữ liệu ở trang web
        //alert("1 đơn xin điểm danh bù"); // hiển thị dữ liệu ở dạng cửa sổ thông báo
        var a = 10; // khai báo biến a có giá trị là 10;
        console.log("Giá trị của biến a là:"+a);
        //var x = prompt("Nhập giá trị của x"); // Nhập giá trị từ bàn phím thông qua cửa sổ prompt
        //document.write("<br>"+"Giá trị của N là: "+x);
        // Nhập 2 số a và b, tính tổng, hiệu tích, thương
        var c = Number(prompt("Nhập số 1"));
        var d = Number(prompt("Nhập số 2"));
        var tong = c + d;
        var hieu = c-d;
        var tich = c*d;
        var thuong = c/d;
        document.write("<br>"+"Tổng là: "+tong);
        document.write("<br>"+"Hiệu là: "+hieu);
        document.write("<br>"+"Tích là: "+tich);
        document.write("<br>"+"Thương là: "+thuong);
    </script>
</body>
</html>
