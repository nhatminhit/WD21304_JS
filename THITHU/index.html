<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đặt vé xem phim</title>
    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
        }
        .container {
            width: 450px;
            margin: 40px auto;
            border: 1px solid #333;
            padding: 20px;
            background: #fff;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        td {
            padding: 8px;
        }
        input, select {
            width: 100%;
            padding: 5px;
        }
        .error {
            color: red;
            font-size: 13px;
        }
        .center {
            text-align: center;
        }
    </style>
    <script src="js.js"></script>
</head>
<body>

<div class="container">
    <h2 style="text-align:center;">ĐẶT VÉ XEM PHIM</h2>

    <form onsubmit="return datVe()">
        <table border="1">
            <tr>
                <td>Tên khách</td>
                <td>
                    <input type="text" id="ten">
                    <div class="error" id="errTen"></div>
                </td>
            </tr>

            <tr>
                <td>Loại vé</td>
                <td>
                    <select id="loaiVe" onchange="chonLoaiVe()">
                        <option value="">--Chọn--</option>
                        <option value="50000">Vé thường</option>
                        <option value="100000">Vé VIP</option>
                        <option value="180000">Vé đôi</option>
                    </select>
                    <div class="error" id="errLoai"></div>
                </td>
            </tr>

            <tr>
                <td>Giá vé</td>
                <td><input type="text" id="giaVe" readonly></td>
            </tr>

            <tr>
                <td>Số lượng</td>
                <td>
                    <input type="number" id="soLuong" oninput="tinhTongTien()">
                    <div class="error" id="errSL"></div>
                </td>
            </tr>

            <tr>
                <td>Nhận vé</td>
                <td>
                    <input type="radio" name="nhan" value="0" onchange="chonNhan(this)"> Tại rạp
                    <input type="radio" name="nhan" value="20000" onchange="chonNhan(this)"> Giao tận nơi
                </td>
            </tr>

            <tr>
                <td>Phí giao</td>
                <td><input type="text" id="phi" value="0" readonly></td>
            </tr>

            <tr>
                <td>Tổng tiền</td>
                <td><input type="text" id="tongTien" readonly></td>
            </tr>

            <tr>
                <td colspan="2" class="center">
                    <button type="submit">Đặt vé</button>
                </td>
            </tr>
        </table>
    </form>
</div>
</body>
</html>
